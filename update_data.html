<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Update Buku - Libris</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            display: flex;
            min-height: 100vh;
            background: #f7f0e8;
        }

        /* ─── SIDEBAR ─── */
        .sidebar {
            width: 250px;
            min-height: 100vh;
            background: linear-gradient(160deg, #fff0e9 0%, #b97a36 100%);
            display: flex;
            flex-direction: column;
            position: fixed;
            top: 0; left: 0;
            z-index: 20;
            box-shadow: 4px 0 24px rgba(140,80,20,0.13);
        }

        .sidebar-brand {
            padding: 32px 28px 24px;
            border-bottom: 1px solid rgba(255,255,255,0.25);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .sidebar-brand .icon { font-size: 28px; }

        .sidebar-brand span {
            font-size: 22px;
            font-weight: 700;
            color: #4d3d0f;
            letter-spacing: 2px;
        }

        .sidebar-nav {
            flex: 1;
            padding: 20px 16px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 11px 14px;
            border-radius: 12px;
            text-decoration: none;
            color: rgba(255,255,255,0.85);
            font-size: 14px;
            font-weight: 500;
            transition: 0.2s;
        }

        .nav-item i { width: 20px; font-size: 15px; }
        .nav-item:hover { background: rgba(255,255,255,0.18); color: #fff; }

        .nav-item.active {
            background: rgba(255,255,255,0.28);
            color: #fff;
            font-weight: 600;
        }

        .sidebar-footer {
            padding: 20px 16px 28px;
            border-top: 1px solid rgba(255,255,255,0.2);
        }

        .btn-logout {
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(255,255,255,0.18);
            border: 1.5px solid rgba(255,255,255,0.3);
            border-radius: 12px;
            padding: 11px 16px;
            color: #ffe0c8;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            text-align: left;
            transition: 0.2s;
        }

        .btn-logout:hover {
            background: rgba(255,80,60,0.18);
            color: #ff9b7a;
            border-color: rgba(255,120,80,0.4);
        }

        /* ─── MAIN ─── */
        .main { margin-left: 250px; flex: 1; display: flex; flex-direction: column; }

        .topbar {
            background: white;
            padding: 16px 36px;
            display: flex;
            align-items: center;
            gap: 16px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .btn-back {
            width: 38px;
            height: 38px;
            border-radius: 10px;
            background: #fdf6ee;
            border: 1.5px solid #f0e0cc;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #a8916a;
            text-decoration: none;
            transition: 0.2s;
        }

        .btn-back:hover { background: #b97a36; color: white; border-color: transparent; }

        .topbar-title { font-size: 20px; font-weight: 700; color: #5a3310; }

        .content { padding: 36px; flex: 1; }

        /* ─── FORM CARD ─── */
        .form-card {
            background: white;
            border-radius: 24px;
            box-shadow: 0 4px 24px rgba(185,122,54,0.10);
            overflow: hidden;
            max-width: 800px;
        }

        /* Header update — warna sedikit berbeda biar beda dari tambah */
        .form-header {
            background: linear-gradient(135deg, #b97a36, #7a4d1e);
            padding: 28px 36px;
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .form-header-icon {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            background: rgba(255,255,255,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            color: white;
            flex-shrink: 0;
        }

        .form-header .eyebrow {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: rgba(255,255,255,0.75);
            margin-bottom: 4px;
        }

        .form-header h2 {
            font-size: 18px;
            font-weight: 700;
            color: #f2ead1;
        }

        .form-body { padding: 36px; }

        .form-group {
            margin-bottom: 20px;
            width: 100%;
        }

        .form-group label {
            display: block;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #a8916a;
            margin-bottom: 8px;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 13px 16px;
            border: 2px solid #f0e0cc;
            border-radius: 12px;
            outline: none;
            font-size: 14px;
            color: #5a3310;
            background: #fdf8f3;
            transition: 0.2s;
            font-family: 'Poppins', sans-serif;
        }

        .form-group input:focus,
        .form-group select:focus {
            border-color: #b97a36;
            background: white;
            box-shadow: 0 0 0 3px rgba(185,122,54,0.1);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .form-row-third {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 20px;
        }

        /* badge ID buku */
        .id-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: #fff3e0;
            color: #b97a36;
            border: 1.5px solid #f0d9b5;
            border-radius: 8px;
            padding: 6px 14px;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 28px;
        }

        .form-footer {
            padding: 24px 36px;
            border-top: 1px solid #f3e9dc;
            display: flex;
            gap: 12px;
        }

        .btn-batal {
            flex: 1;
            padding: 13px;
            border-radius: 12px;
            border: 1.5px solid #f0e0cc;
            background: white;
            color: #a8916a;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            text-align: center;
            text-decoration: none;
            display: block;
            transition: 0.2s;
            font-family: 'Poppins', sans-serif;
        }

        .btn-batal:hover { background: #fdf6ee; border-color: #b97a36; color: #b97a36; }

        .btn-simpan {
            flex: 1;
            padding: 13px;
            border-radius: 12px;
            background: linear-gradient(135deg, #896945, #b97a36);
            color: white;
            font-size: 13px;
            font-weight: 700;
            border: none;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 4px 14px rgba(185,122,54,0.3);
            font-family: 'Poppins', sans-serif;
        }

        .btn-simpan:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(185,122,54,0.35);
        }

        @media (max-width: 768px) {
            .sidebar { display: none; }
            .main { margin-left: 0; }
            .content { padding: 20px; }
            .form-row, .form-row-third { grid-template-columns: 1fr; }
            .form-body { padding: 24px; }
            .form-footer { padding: 20px 24px; }
        }
    </style>
</head>
<body>

    <!-- ─── SIDEBAR ─── -->
    <aside class="sidebar">
        <div class="sidebar-brand">
            <span class="icon">📚</span>
            <span>Modern</span>
        </div>
        <nav class="sidebar-nav">
            <a href="{{ url_for('auth.dashboard') }}" class="nav-item">
                <i class="fas fa-chart-line"></i> Ringkasan
            </a>
            <a href="{{ url_for('auth.buku') }}" class="nav-item active">
                <i class="fas fa-book"></i> Data Buku
            </a>
            <a href="{{ url_for('auth.anggota') }}" class="nav-item">
                <i class="fas fa-users"></i> Data Anggota
            </a>
            <a href="{{ url_for('auth.peminjaman') }}" class="nav-item">
                <i class="fas fa-exchange-alt"></i> Data Peminjaman
            </a>

            <div class="nav-section-label">Laporan</div>
            <a href="{{ url_for('auth.laporan') }}" class="nav-item">
                <i class="fas fa-file-invoice"></i>
                Laporan Peminjaman
            </a>
        </nav>
        <div class="sidebar-footer">
            <form action="/logout" method="POST">
                <button type="submit" class="btn-logout">
                    <i class="fas fa-sign-out-alt"></i> Keluar
                </button>
            </form>
        </div>
    </aside>

    <!-- ─── MAIN ─── -->
    <div class="main">
        <header class="topbar">
            <a href="{{ url_for('auth.buku') }}" class="btn-back">
                <i class="fas fa-arrow-left"></i>
            </a>
            <div class="topbar-title">Update Data Koleksi</div>
        </header>

        <div class="content">
            <div class="form-card">

                <div class="form-header">
                    <div class="form-header-icon">
                        <i class="fas fa-pen"></i>
                    </div>
                    <div>
                        <div class="eyebrow">Formulir Update Data</div>
                        <h2>Edit Informasi Buku</h2>
                    </div>
                </div>

                <form action="{{ url_for('auth.cupdate_buku', id_buku=buku.id_buku) }}" method="POST">
                    <div class="form-body">

                        <div class="id-badge">
                            <i class="fas fa-tag"></i>
                            ID Buku: #{{ buku.id_buku }}
                        </div>

                        <div class="form-group">
                            <label>Judul Lengkap Buku</label>
                            <input type="text" name="judul_buku" value="{{ buku.judul_buku }}" required>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label>Kategori</label>
                                <select name="id_kategori" required>
                                    <option value="" disabled>Pilih Kategori</option>
                                    {% for kat in daftar_kategori %}
                                    <option value="{{ kat.id_kategori }}" {% if kat.id_kategori == buku.id_kategori %}selected{% endif %}>
                                        {{ kat.nama_kategori }}
                                    </option>
                                    {% endfor %}
                                </select>
                            </div>
                            <div class="form-group">
                                <label>Tahun Terbit</label>
                                <input type="number" name="tahun_terbit" value="{{ buku.tahun_terbit }}" required>
                            </div>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label>Penulis</label>
                                <input type="text" name="penulis" value="{{ buku.penulis }}" required>
                            </div>
                            <div class="form-group">
                                <label>Penerbit</label>
                                <input type="text" name="penerbit" value="{{ buku.penerbit }}" required>
                            </div>
                        </div>

                        <div class="form-row-third">
                            <div class="form-group">
                                <label>Jumlah Stok</label>
                                <input type="number" name="stok" value="{{ buku.stok }}" min="0" required>
                            </div>
                        </div>

                    </div>

                    <div class="form-footer">
                        <a href="{{ url_for('auth.buku') }}" class="btn-batal">Batalkan</a>
                        <button type="submit" class="btn-simpan">Simpan Perubahan</button>
                    </div>
                </form>

            </div>
        </div>
    </div>

</body>
</html>
